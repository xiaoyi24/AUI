<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AUI - 智能助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 {
      font-size: 18px;
      color: #7c3aed;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      background: #16213e;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }
    .status-dot.inactive {
      background: #6b7280;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #7c3aed;
      color: white;
    }
    .btn-primary:hover {
      background: #6d28d9;
    }
    .btn-secondary {
      background: #374151;
      color: #e0e0e0;
      margin-top: 8px;
    }
    .btn-secondary:hover {
      background: #4b5563;
    }
    .info {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>🧚 AUI 智能助手</h1>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">正在检测...</span>
  </div>
  <button class="btn btn-primary" id="toggleBtn">在当前页面激活精灵</button>
  <button class="btn btn-secondary" id="settingsBtn">⚙️ 设置</button>
  <p class="info">v0.1.0 | Datawhale 智能体大赛</p>
  <script src="./index.ts" type="module"></script>
</body>
</html>
